<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروژه‌ها | کارلنسر</title>
    <link rel="stylesheet" href="../../src/css/style.css">
    <link rel="stylesheet" href="../../src/css/projects.css">
    <link rel="icon" type="image/svg+xml" href="../../svg/favicon.svg">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="navbar">
                <!-- دکمه همبرگر (سمت راست در RTL) -->
                <button class="mobile-menu-toggle" aria-label="منو">
                    <span></span><span></span><span></span>
                </button>

                <div class="logo">
                    <a href="../../index.html">
                        <img src="../../public/Icon.svg" alt="لوگو کارلنسر" class="logo-img">
                        <span class="logo-text">کارلنسر</span>
                    </a>
                </div>

                <nav class="nav-menu">
                    <ul>
                        <li><a href="../../index.html">خانه</a></li>
                        <li><a href="./projects.html" class="active">پروژه‌ها</a></li>
                        <li><a href="./about.html">درباره ما</a></li>
                        <li><a href="./contact.html">تماس با ما</a></li>
                    </ul>
                </nav>

                <div class="auth-buttons">
                    <a href="./login.html" class="btn btn-outline">ورود</a>
                    <a href="./register.html" class="btn btn-primary">ثبت‌نام</a>
                </div>
            </div>
        </div>
    </header>

    <main class="projects-main">
        <div class="container">
            <div class="page-header">
                <h1>پروژه‌های قابل انجام</h1>
                <p>از بین پروژه‌های زیر، بهترین گزینه را انتخاب کنید</p>
            </div>

            <div class="filter-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="جستجوی پروژه...">
                    <button id="searchBtn">
                        <img src="../../svg/search.svg" alt="جستجو"> جستجو
                    </button>
                </div>
                <div class="category-filter">
                    <button class="filter-btn active" data-category="all">همه</button>
                    <button class="filter-btn" data-category="برنامه‌نویسی">برنامه‌نویسی</button>
                    <button class="filter-btn" data-category="طراحی گرافیک">طراحی گرافیک</button>
                    <button class="filter-btn" data-category="سئو و بازاریابی">سئو و بازاریابی</button>
                    <button class="filter-btn" data-category="تولید محتوا">تولید محتوا</button>
                    <button class="filter-btn" data-category="ترجمه">ترجمه</button>
                    <button class="filter-btn" data-category="پشتیبانی فنی">پشتیبانی فنی</button>
                </div>
            </div>

            <div id="projectsList" class="projects-list"></div>
        </div>
    </main>

    <!-- اضافه شدن main.js برای منوی همبرگر -->
    <script type="module" src="../../src/js/main.js"></script>
    <script type="module" src="../../src/js/projects.js"></script>
